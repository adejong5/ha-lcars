      \ else 24 }}px !important;\n  &:not(.type-undefined,.type-custom-grid-layout) {\n\
      \    height: 100%;\n  }\n  \n}\n:host > ha-card > .card-actions,\n:host > ha-card\
      \ > .card-actions .position-badge {\n  color: var(--lcars-text-dark);\n}\n\n/* -----------------------------------------------\
      \ */\n/*                Common Card Styles               */\n/* -----------------------------------------------\
      \ */\n:host > ha-card {\n  font-family: var(--font-family) !important;\n  --md-sys-color-primary:\
      \ var(--lcars-ui-quaternary) !important;\n}\n\n/* ===============================================\
      \ */\n/*        HEADER CLASSES AND CARD TYPE FIXES       */\n/* ===============================================\
      \ */\n\n/* ------------- Common Header Styles ------------ */\n:host(.header-left),\n\
      :host(.header-right),\n:host(.header-contained),\n:host(.header-open),\nha-card:is(.header-left,\n\
      \           .header-right,\n           .header-contained,\n           .header-open\n\
      ):not(div > *) {\n  display: block !important;\n  height: 100%;\n  border: 0px solid\
      \ var(--lcars-card-top-color);\n  border-top-width: var(--lcars-horizontal-border);\n\
      \  border-radius: 0px;\n  padding: 0px;\n  box-sizing: border-box;\n  background-color:\
      \ var(--lcars-card-top-color);\n  text-transform: uppercase;\n\n  > :not(style,card-mod)\
      \ {\n    border-radius: 0px;\n    background-color: var(--lcars-background-color);\n\
      \    padding-top: 6px;\n    --primary-text-color: var(--lcars-text-gray);\n    height:\
      \ 100%;\n    box-sizing: border-box;\n    \n    > .name {\n    --primary-text-color:\
      \ var(--lcars-text-gray);\n    }\n  }\n  > ha-markdown,\n  > ha-card > ha-markdown\
      \ {\n    padding-block: 0px;\n  }\n}\n\n/* ----------------Border on left-----------------\
      \ */\n:host(.header-left),\n:host(.header-contained),\nha-card:is(.header-left,\n\
      \           .header-contained\n):not(div > *) {\n  border-top-left-radius: var(--ha-card-border-radius);\n\
      \  border-left-width: var(--lcars-vertical-border);\n\n  > :not(style,card-mod)\
      \ {\n    border-top-left-radius: var(--lcars-inner-radius);\n    padding-left: 6px;\n\
      \    --primary-text-color: var(--lcars-text-gray);\n  }\n}\n\n/* ----------------Border\
      \ on right---------------- */\n:host(.header-right),\n:host(.header-contained),\n\
      ha-card:is(.header-right,\n           .header-contained\n):not(div > *) {\n  border-top-right-radius:\
      \ var(--ha-card-border-radius);\n  border-right-width: var(--lcars-vertical-border);\n\
      \n  > :not(style,card-mod) {\n    border-top-right-radius: var(--lcars-inner-radius);\n\
      \    padding-right: 6px;\n    --primary-text-color: var(--lcars-text-gray);\n  }\n\
      }\n\n/* =============================================== */\n/*        MIDDLE CLASSES\
      \ AND CARD TYPE FIXES       */\n/* ===============================================\
      \ */\n\n/* ------------- Common Middle Styles ------------ */\n:host(.middle-left),\n\
      :host(.middle-right),\n:host(.middle-contained),\n:host(.middle-blank),\nha-card:is(.middle-left,\n\
      \           .middle-right,\n           .middle-contained,\n           .middle-blank\n\
      ):not(div > *)  {\n  display: block !important;\n  height: 100%;\n  background-color:\
      \ var(--lcars-background-color);\n  padding: 0px;\n  box-sizing: border-box;\n \
      \ border-radius: 0px;\n  border-inline: 0px solid var(--lcars-card-mid-left-color);\n\
      \  text-transform: uppercase;\n\n  > :not(style,card-mod) {\n    border-radius:\
      \ 0px;\n    background-color: var(--lcars-background-color);\n    --primary-text-color:\
      \ var(--lcars-text-gray);\n    height: 100%;\n    box-sizing: border-box;\n    \n\
      \    > .name {\n    --primary-text-color: var(--lcars-text-gray);\n    }\n  }\n\
      }\n\n/* -----------------Border on left---------------- */\n:host(.middle-left),\n\
      :host(.middle-contained),\nha-card:is(.middle-left,\n           .middle-contained\n\
      ):not(div > *) {\n  border-left-width: var(--lcars-vertical-border);\n  > :not(style,card-mod)\
      \ {\n    padding-left: 6px;\n  }\n}\n\n/* ----------------Border on right----------------\
      \ */\n:host(.middle-right),\n:host(.middle-contained),\nha-card:is(.middle-right,\n\
