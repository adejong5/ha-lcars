      \ 100%);\n      }\n      > #content {\n        padding-left: var(--ha-card-border-radius);\n\
      \        padding-right: 18px;\n        justify-content: right;\n      }\n    }\n\
      \  }\n  \n}\n\n\n/* =============================================== */\n/*     \
      \               BAR STYLES                   */\n/* ===============================================\
      \ */\n\n/* ----------------------------------------------- */\n/*              \
      \  Common Bar Styles                */\n/* -----------------------------------------------\
      \ */\n:host(.bar-left),\n:host(.bar-right),\n:host(.bar-large-left),\n:host(.bar-large-right),\n\
