      \  background-color: var(--lcars-card-bottom-color);\n  text-transform: uppercase;\n\
      \n  > :not(style,card-mod) {\n    border-radius: 0px;\n    background-color: var(--lcars-background-color);\n\
      \    padding-bottom: 6px;\n    height: 100%;\n    box-sizing: border-box;\n    --primary-text-color:\
      \ var(--lcars-text-gray);\n\n    > .name {\n    --primary-text-color: var(--lcars-text-gray);\n\
      \    }\n  }\n  > ha-markdown,\n  > ha-card > ha-markdown {\n    padding-block: 0px;\n\
      \  }\n}\n\n/* ----------------------------------------------- */\n/*           \
      \   Specific Footer Styles             */\n/* -----------------------------------------------\
      \ */\n\n/* -----------------Border on left---------------- */\n:host(.footer-left),\n\
      :host(.footer-contained),\nha-card:is(.footer-left,\n           .footer-contained\n\
      ):not(div > *)  {\n  border-bottom-left-radius: var(--ha-card-border-radius) !important;\n\
      \  border-left-width: var(--lcars-vertical-border);\n\n  > :not(style,card-mod)\
      \ {\n    border-bottom-left-radius: var(--lcars-inner-radius) !important;\n    padding-left:\
      \ 6px;\n  }\n}\n\n/* ----------------Border on right---------------- */\n:host(.footer-right),\n\
      :host(.footer-contained),\nha-card:is(.footer-right,\n           .footer-contained\n\
      ):not(div > *)  {\n  border-bottom-right-radius: var(--ha-card-border-radius) !important;\n\
      \  border-right-width: var(--lcars-vertical-border);\n\n  > :not(style,card-mod)\
      \ {\n    border-bottom-right-radius: var(--lcars-inner-radius) !important;\n   \
      \ padding-right: 6px;\n  }\n}\n\n/* ===============================================\
      \ */\n/*                     BUTTONS                     */\n/* ===============================================\
      \ */\n\n/* ----------------------------------------------- */\n/*              \
      \ Common Button Styles              */\n/* -----------------------------------------------\
      \ */\n:host(.button-small),\n:host(.button-large),\n:host(.button-lozenge-left),\n\
      :host(.button-lozenge-right),\n:host(.button-bullet-left) ,\n:host(.button-bullet-right),\n\
      :host(.button-capped-left),\n:host(.button-capped-right),\n:host(.button-barrel-left),\n\
      :host(.button-barrel-right),\n:host(.button-bar-left),\n:host(.button-bar-right)\
      \ {\n\n  > ha-card, \n  > #aspect-ratio > ha-card {\n    background-color: var(--lcars-card-button);\n\
      \    --primary-color: var(--lcars-ui-quaternary);\n    text-transform: uppercase;\n\
      \    --primary-text-color: var(--lcars-text-dark);\n    --secondary-text-color:\
      \ var(--lcars-text-dark);\n  }\n}\n\n/* -----------------------------------------------\
      \ */\n/*           Small Button Class and Fixes          */\n/* -----------------------------------------------\
      \ */\n:host(.button-small) {\n  > ha-card, \n  > #aspect-ratio > ha-card {\n   \
      \ display: flex;\n    border-radius: 0px !important;\n    position: relative;\n\
      \    flex-direction: column;\n    flex-wrap: nowrap;\n    justify-content: center;\n\
      \  }\n}\n:host(.button-small) > ha-card > .more-info {\n  display: none;\n}\n:host(.button-small)\
      \ > ha-card > .content > #controls {\n  display: flex;\n  place-content: flex-start\
      \ center;\n  position: relative;\n  padding: 0px;\n}\n:host(.button-small) > ha-card\
      \ > .content > #info {\n  text-align: right;\n  box-sizing: border-box;\n  width:\
      \ 100%;\n  padding: 0px 6px 6px 0px;\n  margin-top: -24px;\n  position: relative;\n\
      }\n:host(.button-small) > ha-card > span {\n  box-sizing: border-box;\n  text-align:\
      \ right;\n  width: 100%;\n  padding: 6px;\n  margin: unset;\n  position: absolute;\n\
      \  bottom: 0;\n}\n:host(.button-small) > ha-card > span.state {\n  text-align: right;\n\
      \  width: 100%;\n  padding: 6px;\n  padding-bottom: 22px;\n  margin: unset;\n  position:\
      \ absolute;\n  bottom: 0;\n}\n\n/* -----------------------------------------------\
      \ */\n/*           Large Button Class and Fixes          */\n/* -----------------------------------------------\
      \ */\n:host(.button-large) > ha-card {\n}\n\n/* ===============================================\
      \ */\n/*      BULLET/LOZENGE/CAPPED/BARREL BUTTONS       */\n/* ===============================================\
      \ */\n\n:host(.button-lozenge-left),\n:host(.button-bullet-left),\n:host(.button-capped-left),\n\
      :host(.button-barrel-left),\n:host(.button-lozenge-right),\n:host(.button-bullet-right),\n\
      :host(.button-capped-right),\n:host(.button-barrel-right),\n:host(.button-bar-left),\n\
      :host(.button-bar-right) {\n\n  > ha-card#container,\n  > ha-card, \n  > #aspect-ratio\
      \ > ha-card {\n    min-height: 60px;\n    display: flex;\n    align-items: flex-end;\n\
      \    flex-direction: column-reverse;\n    border-radius: 0px;\n    padding-block:\
      \ 0px;\n\n    > ha-state-icon {\n      --mdc-icon-size: unset;\n      background-color:\
      \ var(--lcars-card-top-color);\n      position: absolute;\n      left: 0;\n    \
      \  width: var(--lcars-vertical-border);\n      height: 100% !important;\n      max-height:\
      \ 100% !important;\n      border-right: var(--lcars-background-color) solid 6px;\n\
      \      display: flex;\n      align-items: center;\n      justify-content: center;\n\
      \    }\n    \n    > span {\n      width: 100%;\n      height: 100%;\n      display:\
      \ flex;\n      align-items: flex-end;\n      justify-content: flex-end;\n      margin-top:\
      \ unset;\n      padding: 6px;\n    }\n    \n    > span.state {\n      align-items:\
      \ center;\n      color: var(--lcars-text-dark);\n    }\n\n    /* Big Slider Card\
      \ */\n    &:is(#container) {\n      > #slider {\n        right: 0;\n        left:\
      \ calc(var(--lcars-vertical-border) + 6px);\n        background: linear-gradient(90deg,\
      \ var(--bsc-slider-color), var(--bsc-slider-color) var(--bsc-percent), transparent\
      \ var(--bsc-percent), transparent 100%);\n      }\n      > #content {\n        padding-left:\
      \ calc(var(--lcars-vertical-border) + 18px);\n        justify-content: right;\n\
      \      }\n    }\n  }\n}\n\n/* ----------------------------------------------- */\n\
      /*               Flip Right Buttons                */\n/* -----------------------------------------------\
      \ */\n:host(.button-lozenge-right),\n:host(.button-bullet-right),\n:host(.button-capped-right),\n\
      :host(.button-barrel-right) {\n\n  > ha-card#container,\n  > ha-card, \n  > #aspect-ratio\
      \ > ha-card {\n\n    align-items: flex-start;\n\n    > ha-state-icon {\n      left:\
      \ auto;\n      right: 0;\n      border-right: 0px;\n      border-left: var(--lcars-background-color)\
      \ solid 6px;\n    }\n    \n    > span {\n      justify-content: flex-start;\n  \
      \    left: var(--lcars-vertical-border);\n      padding-inline: 6px;\n    }\n  \
      \  \n    /* Big Slider Card */\n    &:is(#container) {\n      > #slider {\n    \
      \    right: calc(var(--lcars-vertical-border) + 6px);\n        left: 0;\n      \
      \  background: linear-gradient(90deg, var(--bsc-slider-color), var(--bsc-slider-color)\
      \ var(--bsc-percent), transparent var(--bsc-percent), transparent 100%);\n     \
