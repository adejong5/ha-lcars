      \ 9998;\n  position: absolute;\n  mix-blend-mode: overlay;\n  opacity: .8;\n  right:\
      \ unset;\n  bottom: unset;\n  left: unset;\n  pointer-events: none;\n  box-shadow:\
      \ none;\n}\n.header::after {\n  content: \"\";\n  background: url(data:image/png;base64,);\n\
      \  width: 100%;\n  height: 40px;\n  z-index: 9999;\n  position: absolute;\n  mix-blend-mode:\
      \ overlay;\n  opacity: .8;\n  top: 0px;\n  right: unset;\n  bottom: unset;\n  left:\
      \ unset;\n  pointer-events: none;\n  box-shadow: none;\n}\nhui-masonry-view::before,\n\
      vertical-layout::before,\nhorizontal-layout::before,\ngrid-layout::before,\nmasonry-layout::before\
      \ {\n  content: radial-gradient(ellipse farthest-corner at center center, white\
