      \ 100%;\n  padding: 0px 6px 6px 0px;\n  margin-top: -24px;\n  position: relative;\n\
      }\n:host(.button-small) > ha-card > span {\n  box-sizing: border-box;\n  text-align:\
      \ right;\n  width: 100%;\n  padding: 6px;\n  margin: unset;\n  position: absolute;\n\
      \  bottom: 0;\n}\n:host(.button-small) > ha-card > span.state {\n  text-align: right;\n\
      \  width: 100%;\n  padding: 6px;\n  padding-bottom: 22px;\n  margin: unset;\n  position:\
      \ absolute;\n  bottom: 0;\n}\n\n/* -----------------------------------------------\
      \ */\n/*           Large Button Class and Fixes          */\n/* -----------------------------------------------\
      \ */\n:host(.button-large) > ha-card {\n}\n\n/* ===============================================\
      \ */\n/*      BULLET/LOZENGE/CAPPED/BARREL BUTTONS       */\n/* ===============================================\
      \ */\n\n:host(.button-lozenge-left),\n:host(.button-bullet-left),\n:host(.button-capped-left),\n\
      :host(.button-barrel-left),\n:host(.button-lozenge-right),\n:host(.button-bullet-right),\n\
      :host(.button-capped-right),\n:host(.button-barrel-right),\n:host(.button-bar-left),\n\
      :host(.button-bar-right) {\n\n  > ha-card#container,\n  > ha-card, \n  > #aspect-ratio\
      \ > ha-card {\n    min-height: 60px;\n    display: flex;\n    align-items: flex-end;\n\
      \    flex-direction: column-reverse;\n    border-radius: 0px;\n    padding-block:\
      \ 0px;\n\n    > ha-state-icon {\n      --mdc-icon-size: unset;\n      background-color:\
      \ var(--lcars-card-top-color);\n      position: absolute;\n      left: 0;\n    \
      \  width: var(--lcars-vertical-border);\n      height: 100% !important;\n      max-height:\
      \ 100% !important;\n      border-right: var(--lcars-background-color) solid 6px;\n\
      \      display: flex;\n      align-items: center;\n      justify-content: center;\n\
      \    }\n    \n    > span {\n      width: 100%;\n      height: 100%;\n      display:\
      \ flex;\n      align-items: flex-end;\n      justify-content: flex-end;\n      margin-top:\
      \ unset;\n      padding: 6px;\n    }\n    \n    > span.state {\n      align-items:\
      \ center;\n      color: var(--lcars-text-dark);\n    }\n\n    /* Big Slider Card\
      \ */\n    &:is(#container) {\n      > #slider {\n        right: 0;\n        left:\
      \ calc(var(--lcars-vertical-border) + 6px);\n        background: linear-gradient(90deg,\
      \ var(--bsc-slider-color), var(--bsc-slider-color) var(--bsc-percent), transparent\
      \ var(--bsc-percent), transparent 100%);\n      }\n      > #content {\n        padding-left:\
      \ calc(var(--lcars-vertical-border) + 18px);\n        justify-content: right;\n\
      \      }\n    }\n  }\n}\n\n/* ----------------------------------------------- */\n\
      /*               Flip Right Buttons                */\n/* -----------------------------------------------\
      \ */\n:host(.button-lozenge-right),\n:host(.button-bullet-right),\n:host(.button-capped-right),\n\
      :host(.button-barrel-right) {\n\n  > ha-card#container,\n  > ha-card, \n  > #aspect-ratio\
      \ > ha-card {\n\n    align-items: flex-start;\n\n    > ha-state-icon {\n      left:\
      \ auto;\n      right: 0;\n      border-right: 0px;\n      border-left: var(--lcars-background-color)\
      \ solid 6px;\n    }\n    \n    > span {\n      justify-content: flex-start;\n  \
      \    left: var(--lcars-vertical-border);\n      padding-inline: 6px;\n    }\n  \
      \  \n    /* Big Slider Card */\n    &:is(#container) {\n      > #slider {\n    \
      \    right: calc(var(--lcars-vertical-border) + 6px);\n        left: 0;\n      \
      \  background: linear-gradient(90deg, var(--bsc-slider-color), var(--bsc-slider-color)\
      \ var(--bsc-percent), transparent var(--bsc-percent), transparent 100%);\n     \
      \ }\n      > #content {\n        padding-left: var(--ha-card-border-radius);\n \
      \       padding-right: 0px;\n        justify-content: left;\n      }\n    }\n  }\n\
      }\n\n\n/* ----------------------------------------------- */\n/*               \
      \    Corner Radii                  */\n/* -----------------------------------------------\
      \ */\n:host(.button-lozenge-left),\n:host(.button-lozenge-right),\n:host(.button-bullet-left),\n\
      :host(.button-capped-right),\n:host(.button-bar-left),\n:host(.button-bar-right)\
      \ {\n  > ha-card#container,\n  > ha-card, \n  > #aspect-ratio > ha-card {\n    border-top-right-radius:\
      \ var(--ha-card-border-radius);\n    border-bottom-right-radius: var(--ha-card-border-radius);\n\
      \  }\n}\n:host(.button-lozenge-left),\n:host(.button-lozenge-right),\n:host(.button-bullet-right),\n\
      :host(.button-capped-left),\n:host(.button-bar-left),\n:host(.button-bar-right)\
      \ {\n  > ha-card#container,\n  > ha-card, \n  > #aspect-ratio > ha-card {\n\n  \
      \  border-top-left-radius: var(--ha-card-border-radius);\n    border-bottom-left-radius:\
      \ var(--ha-card-border-radius);\n  }\n}\n:host(.button-lozenge-left), \n:host(.button-bullet-left)\
      \ {\n  > ha-card#container,\n  > ha-card, \n  > #aspect-ratio > ha-card {\n    >\
      \ span {\n      padding-right: var(--ha-card-border-radius);\n    }\n  }\n}\n:host(.button-lozenge-right),\
      \ \n:host(.button-bullet-right) {\n  > ha-card#container,\n  > ha-card, \n  > #aspect-ratio\
      \ > ha-card {\n    > span {\n      padding-left: var(--ha-card-border-radius);\n\
      \    }\n  }\n}\n\n/* ----------------------------------------------- */\n/*    \
      \              Button Bar                     */\n/* -----------------------------------------------\
      \ */\n:host(.button-bar-left),\n:host(.button-bar-right) {\n  > ha-card#container,\n\
      \  > ha-card, \n  > #aspect-ratio > ha-card {\n\n    line-height: 60px;\n    font-size:\
      \ 60px;\n    padding-left: var(--lcars-vertical-border);\n    flex-direction: row;\n\
      \    justify-content: space-between;\n\n    > span {\n      width: fit-content;\n\
      \      padding: 0px;\n\n      &:is(.state) {\n        padding-right: var(--ha-card-border-radius);\n\
      \        height: 100%;\n      }\n\n      &:not(.state) { \n        color: var(--lcars-text-light);\n\
      \        height: 100%;\n        background-color: var(--lcars-background-color);\n\
      \        padding-inline: 6px;\n        padding-bottom: 0.05em;\n        margin-top:\
      \ -0.5em;\n      }\n    }\n    \n    > ha-state-icon {\n      font-size: 0;\n  \
      \  }\n    \n    /* Big Slider Card */\n    &:is(#container) {\n      > #slider {\n\
      \        right: 0;\n        left: calc(var(--lcars-vertical-border) + 6px);\n  \
      \      background: linear-gradient(90deg, var(--bsc-slider-color), var(--bsc-slider-color)\
      \ var(--bsc-percent), transparent var(--bsc-percent), transparent 100%);\n     \
      \ }\n      > #content {\n        position: relative;\n        padding-right: var(--ha-card-border-radius);\n\
      \        padding-left: 18px;\n        padding-bottom: 0.1em;\n        justify-content:\
      \ left;\n      }\n    }\n    \n  }\n}\n\n:host(.button-bar-right) {\n  > ha-card#container,\n\
      \  > ha-card, \n  > #aspect-ratio > ha-card {\n\n    flex-direction: row-reverse;\n\
      \    padding-left: 0;\n    padding-right: var(--lcars-vertical-border);\n\n    >\
      \ span:is(.state) {\n        padding-left: var(--ha-card-border-radius);\n     \
      \   padding-right: 0;\n    }\n\n    > ha-state-icon {\n      left: auto;\n     \
      \ right: 0;\n      border-right: 0px;\n      border-left: var(--lcars-background-color)\
      \ solid 6px;\n    }\n\n    /* Big Slider Card */\n    &:is(#container) {\n     \
      \ > #slider {\n        right: calc(var(--lcars-vertical-border) + 6px);\n      \
      \  left: 0;\n        background: linear-gradient(90deg, var(--bsc-slider-color),\
      \ var(--bsc-slider-color) var(--bsc-percent), transparent var(--bsc-percent), transparent\
      \ 100%);\n      }\n      > #content {\n        padding-left: var(--ha-card-border-radius);\n\
      \        padding-right: 18px;\n        justify-content: right;\n      }\n    }\n\
      \  }\n  \n}\n\n\n/* =============================================== */\n/*     \
      \               BAR STYLES                   */\n/* ===============================================\
      \ */\n\n/* ----------------------------------------------- */\n/*              \
      \  Common Bar Styles                */\n/* -----------------------------------------------\
      \ */\n:host(.bar-left),\n:host(.bar-right),\n:host(.bar-large-left),\n:host(.bar-large-right),\n\
      ha-card:is(.bar-left,\n           .bar-large-left,\n           .bar-right,\n   \
