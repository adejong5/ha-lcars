      \  \n    /* Big Slider Card */\n    &:is(#container) {\n      > #slider {\n    \
      \    right: calc(var(--lcars-vertical-border) + 6px);\n        left: 0;\n      \
      \  background: linear-gradient(90deg, var(--bsc-slider-color), var(--bsc-slider-color)\
      \ var(--bsc-percent), transparent var(--bsc-percent), transparent 100%);\n     \
