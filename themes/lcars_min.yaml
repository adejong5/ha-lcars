      \      fill: var(--lcars-ui-app-header-clock);\n      border-left-color: var(--lcars-ui-app-header-clock);\n\
      \      border-right-color: var(--lcars-ui-app-header-clock);\n    }   \n  }\n\n\
      \  &.hidden-panel {\n    > ha-icon[slot=start],\n    > ha-svg-icon {\n      color:\
