      \ calc( 100% + 3px );\n  }\n  span.badge {\n    position: absolute;\n    display:\
      \ block;\n    top: unset;\n    left: 0px;\n    bottom: 0px;\n    background-color:\
      \ var(--lcars-background-color);\n    border-radius: 0px;\n    height: 100%;\n \
      \   font-size: 38px; \n    line-height: 1;\n    min-width: 46px;\n    border-top:\
