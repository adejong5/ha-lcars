      \ -0.5em;\n      }\n    }\n    \n    > ha-state-icon {\n      font-size: 0;\n  \
      \  }\n    \n    /* Big Slider Card */\n    &:is(#container) {\n      > #slider {\n\
      \        right: 0;\n        left: calc(var(--lcars-vertical-border) + 6px);\n  \
      \      background: linear-gradient(90deg, var(--bsc-slider-color), var(--bsc-slider-color)\
      \ var(--bsc-percent), transparent var(--bsc-percent), transparent 100%);\n     \
      \ }\n      > #content {\n        position: relative;\n        padding-right: var(--ha-card-border-radius);\n\
      \        padding-left: 18px;\n        padding-bottom: 0.1em;\n        justify-content:\
      \ left;\n      }\n    }\n    \n  }\n}\n\n:host(.button-bar-right) {\n  > ha-card#container,\n\
      \  > ha-card, \n  > #aspect-ratio > ha-card {\n\n    flex-direction: row-reverse;\n\
