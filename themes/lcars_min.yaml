      \        \n    > ha-icon,\n    > ha-svg-icon {\n      color: var(--lcars-text-dark);\n\
      \      background-color: var(--lcars-ui-config-icon);\n    }     \n  }\n\n  &.notifications\
      \ {\n    > span.badge {\n      color: var(--lcars-ui-tertiary) !important;\n   \
