      \ {\n    margin-top: 150px;\n    margin-right: 94px;\n    margin-left: 0px;\n  \
      \  z-index: 99;\n  }\n}\n@media screen and (max-width: 870px) {\n  .ha-scrollbar::before\
      \ {\n    content: \"\";\n    position: fixed;\n    top: 40px;\n    left: 56px;\n\
      \    border-left: 5px var(--lcars-background-color) solid;\n    border-top: 5px\
      \ var(--lcars-background-color) solid;\n    border-top-left-radius: calc(var(--lcars-inner-radius)\
      \ + var(--lcars-outer-radius) / 2 );\n    background: transparent;\n    width: calc(\
      \ var(--mdc-drawer-width,256px) - 61px );\n    height: 70px;\n  }\n}\n\n:host ha-icon,\n\
      :host ha-svg-icon,\n:host ha-user-badge {\n  left: 0px;\n  align-content: center;\n\
      \  padding-top: 8px;\n  padding-bottom: 8px;\n  padding-right: 16px;\n  padding-left:\
      \ 16px;\n  min-height: 100%;\n  background-color: var(--lcars-ui-secondary);\n \
      \ border-right: 5px solid var(--lcars-background-color);\n}\n:host ha-user-badge\
      \ {\n  box-sizing: border-box;\n  width: calc( var(--mdc-icon-size,24px) + 37px);\n\
      \  padding-block: 8px;\n}\n\n:host([expanded]) {\n  ha-md-list-item:not(.selected)\
      \ {\n    ha-icon,\n    ha-user-badge,\n    ha-svg-icon {\n      color: var(--lcars-ui-sidebar-icon);\n\
      \      background-color: var(--lcars-card-top-color);\n    }\n  }\n  .menu mwc-button\
      \ {\n    margin-top: 152px !important;\n    margin-left: 7px !important;\n    height:\
      \ 19px;\n    border-radius: var(--lcars-inner-radius);\n    background-color: var(--lcars-ui-tertiary);\n\
      \    align-items: center;\n  }\n  span.badge {\n    font-size: max( 38px, var(--menu-font-size)\
      \ + 10px );\n  }\n  ha-user-badge {\n    padding-block: max( 8px, var(--menu-font-size)/2\
      \ - 2px );\n  }\n}\n\nmwc-button {\n  --mdc-theme-primary: var(--lcars-text-dark);\n\
      }\n\nha-icon-button.hide-panel {\n  color: var(--lcars-text-dark) !important;\n\
      }\n\nha-md-list.ha-scrollbar > .spacer::before {\n  content: \"\";\n  position:\
