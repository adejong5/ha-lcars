    .: "/* =============================================== */\n/*            SECTION-SPECIFIC\
      \ SETTINGS            */\n/* =============================================== */\n\
      :host > ha-card {\n  --paper-item-icon-color: var(--lcars-dark-gray);\n}\n:host,\
      \ :host > ha-card {\n  --lcars-horizontal-border: {{ states('input_number.lcars_horizontal')\
      \ if has_value('input_number.lcars_horizontal') else 10 }}px !important;\n  --lcars-vertical-border:\
      \ {{ states('input_number.lcars_vertical') if has_value('input_number.lcars_vertical')\
      \ else 35 }}px !important;\n  --lcars-middle-vertical-border: {{ states('input_number.lcars_vertical')\
      \ if has_value('input_number.lcars_vertical') else 35 }}px !important;\n  --menu-font-size:\
      \ {{ states('input_number.lcars_menu_font') if has_value('input_number.lcars_menu_font')\
      \ else 24 }}px !important;\n  &:not(.type-undefined,.type-custom-grid-layout) {\n\
      \    height: 100%;\n  }\n  \n}\n:host > ha-card > .card-actions,\n:host > ha-card\
      \ > .card-actions .position-badge {\n  color: var(--lcars-text-dark);\n}\n\n/* -----------------------------------------------\
      \ */\n/*                Common Card Styles               */\n/* -----------------------------------------------\
      \ */\n:host > ha-card {\n  font-family: var(--font-family) !important;\n  --md-sys-color-primary:\
      \ var(--lcars-ui-quaternary) !important;\n}\n\n/* ===============================================\
      \ */\n/*        HEADER CLASSES AND CARD TYPE FIXES       */\n/* ===============================================\
      \ */\n\n/* ------------- Common Header Styles ------------ */\n:host(.header-left),\n\
      :host(.header-right),\n:host(.header-contained),\n:host(.header-open),\nha-card:is(.header-left,\n\
      \           .header-right,\n           .header-contained,\n           .header-open\n\
      ):not(div > *) {\n  display: block !important;\n  height: 100%;\n  border: 0px solid\
      \ var(--lcars-card-top-color);\n  border-top-width: var(--lcars-horizontal-border);\n\
      \  border-radius: 0px;\n  padding: 0px;\n  box-sizing: border-box;\n  background-color:\
      \ var(--lcars-card-top-color);\n  text-transform: uppercase;\n\n  > :not(style,card-mod)\
      \ {\n    border-radius: 0px;\n    background-color: var(--lcars-background-color);\n\
      \    padding-top: 6px;\n    --primary-text-color: var(--lcars-text-gray);\n    height:\
      \ 100%;\n    box-sizing: border-box;\n    \n    > .name {\n    --primary-text-color:\
      \ var(--lcars-text-gray);\n    }\n  }\n  > ha-markdown,\n  > ha-card > ha-markdown\
      \ {\n    padding-block: 0px;\n  }\n}\n\n/* ----------------Border on left-----------------\
      \ */\n:host(.header-left),\n:host(.header-contained),\nha-card:is(.header-left,\n\
      \           .header-contained\n):not(div > *) {\n  border-top-left-radius: var(--ha-card-border-radius);\n\
      \  border-left-width: var(--lcars-vertical-border);\n\n  > :not(style,card-mod)\
      \ {\n    border-top-left-radius: var(--lcars-inner-radius);\n    padding-left: 6px;\n\
      \    --primary-text-color: var(--lcars-text-gray);\n  }\n}\n\n/* ----------------Border\
      \ on right---------------- */\n:host(.header-right),\n:host(.header-contained),\n\
      ha-card:is(.header-right,\n           .header-contained\n):not(div > *) {\n  border-top-right-radius:\
      \ var(--ha-card-border-radius);\n  border-right-width: var(--lcars-vertical-border);\n\
      \n  > :not(style,card-mod) {\n    border-top-right-radius: var(--lcars-inner-radius);\n\
      \    padding-right: 6px;\n    --primary-text-color: var(--lcars-text-gray);\n  }\n\
      }\n\n/* =============================================== */\n/*        MIDDLE CLASSES\
      \ AND CARD TYPE FIXES       */\n/* ===============================================\
      \ */\n\n/* ------------- Common Middle Styles ------------ */\n:host(.middle-left),\n\
      :host(.middle-right),\n:host(.middle-contained),\n:host(.middle-blank),\nha-card:is(.middle-left,\n\
      \           .middle-right,\n           .middle-contained,\n           .middle-blank\n\
      ):not(div > *)  {\n  display: block !important;\n  height: 100%;\n  background-color:\
      \ var(--lcars-background-color);\n  padding: 0px;\n  box-sizing: border-box;\n \
      \ border-radius: 0px;\n  border-inline: 0px solid var(--lcars-card-mid-left-color);\n\
      \  text-transform: uppercase;\n\n  > :not(style,card-mod) {\n    border-radius:\
      \ 0px;\n    background-color: var(--lcars-background-color);\n    --primary-text-color:\
      \ var(--lcars-text-gray);\n    height: 100%;\n    box-sizing: border-box;\n    \n\
      \    > .name {\n    --primary-text-color: var(--lcars-text-gray);\n    }\n  }\n\
      }\n\n/* -----------------Border on left---------------- */\n:host(.middle-left),\n\
      :host(.middle-contained),\nha-card:is(.middle-left,\n           .middle-contained\n\
      ):not(div > *) {\n  border-left-width: var(--lcars-vertical-border);\n  > :not(style,card-mod)\
      \ {\n    padding-left: 6px;\n  }\n}\n\n/* ----------------Border on right----------------\
      \ */\n:host(.middle-right),\n:host(.middle-contained),\nha-card:is(.middle-right,\n\
      \           .middle-contained\n):not(div > *) {\n  border-right-width: var(--lcars-vertical-border);\n\
      \  > :not(style,card-mod) {\n    padding-right: 6px;\n  }\n}\n\n/* ===============================================\
      \ */\n/*        FOOTER CLASSES AND CARD TYPE FIXES       */\n/* ===============================================\
      \ */\n\n/* ------------- Common Footer Styles ------------ */\n:host(.footer-left),\n\
      :host(.footer-right),\n:host(.footer-contained),\n:host(.footer-open),\nha-card:is(.footer-left,\n\
      \           .footer-right,\n           .footer-contained,\n           .footer-open\n\
      ):not(div > *) {\n  display: block !important;\n  height: 100%;\n  padding: 0px;\
      \          \n  box-sizing: border-box;\n  border-radius: 0px;\n  border: 0px solid\
      \ var(--lcars-card-bottom-color);\n  border-bottom-width: var(--lcars-horizontal-border);\n\
      \  background-color: var(--lcars-card-bottom-color);\n  text-transform: uppercase;\n\
      \n  > :not(style,card-mod) {\n    border-radius: 0px;\n    background-color: var(--lcars-background-color);\n\
      \    padding-bottom: 6px;\n    height: 100%;\n    box-sizing: border-box;\n    --primary-text-color:\
      \ var(--lcars-text-gray);\n\n    > .name {\n    --primary-text-color: var(--lcars-text-gray);\n\
      \    }\n  }\n  > ha-markdown,\n  > ha-card > ha-markdown {\n    padding-block: 0px;\n\
      \  }\n}\n\n/* ----------------------------------------------- */\n/*           \
      \   Specific Footer Styles             */\n/* -----------------------------------------------\
      \ */\n\n/* -----------------Border on left---------------- */\n:host(.footer-left),\n\
      :host(.footer-contained),\nha-card:is(.footer-left,\n           .footer-contained\n\
      ):not(div > *)  {\n  border-bottom-left-radius: var(--ha-card-border-radius) !important;\n\
      \  border-left-width: var(--lcars-vertical-border);\n\n  > :not(style,card-mod)\
      \ {\n    border-bottom-left-radius: var(--lcars-inner-radius) !important;\n    padding-left:\
      \ 6px;\n  }\n}\n\n/* ----------------Border on right---------------- */\n:host(.footer-right),\n\
      :host(.footer-contained),\nha-card:is(.footer-right,\n           .footer-contained\n\
      ):not(div > *)  {\n  border-bottom-right-radius: var(--ha-card-border-radius) !important;\n\
      \  border-right-width: var(--lcars-vertical-border);\n\n  > :not(style,card-mod)\
      \ {\n    border-bottom-right-radius: var(--lcars-inner-radius) !important;\n   \
      \ padding-right: 6px;\n  }\n}\n\n/* ===============================================\
      \ */\n/*                     BUTTONS                     */\n/* ===============================================\
      \ */\n\n/* ----------------------------------------------- */\n/*              \
      \ Common Button Styles              */\n/* -----------------------------------------------\
      \ */\n:host(.button-small),\n:host(.button-large),\n:host(.button-lozenge-left),\n\
      :host(.button-lozenge-right),\n:host(.button-bullet-left) ,\n:host(.button-bullet-right),\n\
      :host(.button-capped-left),\n:host(.button-capped-right),\n:host(.button-barrel-left),\n\
      :host(.button-barrel-right),\n:host(.button-bar-left),\n:host(.button-bar-right)\
      \ {\n\n  > ha-card, \n  > #aspect-ratio > ha-card {\n    background-color: var(--lcars-card-button);\n\
      \    --primary-color: var(--lcars-ui-quaternary);\n    text-transform: uppercase;\n\
      \    --primary-text-color: var(--lcars-text-dark);\n    --secondary-text-color:\
      \ var(--lcars-text-dark);\n  }\n}\n\n/* -----------------------------------------------\
      \ */\n/*           Small Button Class and Fixes          */\n/* -----------------------------------------------\
      \ */\n:host(.button-small) {\n  > ha-card, \n  > #aspect-ratio > ha-card {\n   \
      \ display: flex;\n    border-radius: 0px !important;\n    position: relative;\n\
      \    flex-direction: column;\n    flex-wrap: nowrap;\n    justify-content: center;\n\
      \  }\n}\n:host(.button-small) > ha-card > .more-info {\n  display: none;\n}\n:host(.button-small)\
      \ > ha-card > .content > #controls {\n  display: flex;\n  place-content: flex-start\
      \ center;\n  position: relative;\n  padding: 0px;\n}\n:host(.button-small) > ha-card\
      \ > .content > #info {\n  text-align: right;\n  box-sizing: border-box;\n  width:\
      \ 100%;\n  padding: 0px 6px 6px 0px;\n  margin-top: -24px;\n  position: relative;\n\
      }\n:host(.button-small) > ha-card > span {\n  box-sizing: border-box;\n  text-align:\
      \ right;\n  width: 100%;\n  padding: 6px;\n  margin: unset;\n  position: absolute;\n\
      \  bottom: 0;\n}\n:host(.button-small) > ha-card > span.state {\n  text-align: right;\n\
      \  width: 100%;\n  padding: 6px;\n  padding-bottom: 22px;\n  margin: unset;\n  position:\
      \ absolute;\n  bottom: 0;\n}\n\n/* -----------------------------------------------\
      \ */\n/*           Large Button Class and Fixes          */\n/* -----------------------------------------------\
      \ */\n:host(.button-large) > ha-card {\n}\n\n/* ===============================================\
      \ */\n/*      BULLET/LOZENGE/CAPPED/BARREL BUTTONS       */\n/* ===============================================\
      \ */\n\n:host(.button-lozenge-left),\n:host(.button-bullet-left),\n:host(.button-capped-left),\n\
      :host(.button-barrel-left),\n:host(.button-lozenge-right),\n:host(.button-bullet-right),\n\
      :host(.button-capped-right),\n:host(.button-barrel-right),\n:host(.button-bar-left),\n\
      :host(.button-bar-right) {\n\n  > ha-card#container,\n  > ha-card, \n  > #aspect-ratio\
      \ > ha-card {\n    min-height: 60px;\n    display: flex;\n    align-items: flex-end;\n\
      \    flex-direction: column-reverse;\n    border-radius: 0px;\n    padding-block:\
      \ 0px;\n\n    > ha-state-icon {\n      --mdc-icon-size: unset;\n      background-color:\
      \ var(--lcars-card-top-color);\n      position: absolute;\n      left: 0;\n    \
      \  width: var(--lcars-vertical-border);\n      height: 100% !important;\n      max-height:\
      \ 100% !important;\n      border-right: var(--lcars-background-color) solid 6px;\n\
      \      display: flex;\n      align-items: center;\n      justify-content: center;\n\
      \    }\n    \n    > span {\n      width: 100%;\n      height: 100%;\n      display:\
      \ flex;\n      align-items: flex-end;\n      justify-content: flex-end;\n      margin-top:\
      \ unset;\n      padding: 6px;\n    }\n    \n    > span.state {\n      align-items:\
      \ center;\n      color: var(--lcars-text-dark);\n    }\n\n    /* Big Slider Card\
      \ */\n    &:is(#container) {\n      > #slider {\n        right: 0;\n        left:\
      \ calc(var(--lcars-vertical-border) + 6px);\n        background: linear-gradient(90deg,\
      \ var(--bsc-slider-color), var(--bsc-slider-color) var(--bsc-percent), transparent\
      \ var(--bsc-percent), transparent 100%);\n      }\n      > #content {\n        padding-left:\
      \ calc(var(--lcars-vertical-border) + 18px);\n        justify-content: right;\n\
      \      }\n    }\n  }\n}\n\n/* ----------------------------------------------- */\n\
      /*               Flip Right Buttons                */\n/* -----------------------------------------------\
      \ */\n:host(.button-lozenge-right),\n:host(.button-bullet-right),\n:host(.button-capped-right),\n\
      :host(.button-barrel-right) {\n\n  > ha-card#container,\n  > ha-card, \n  > #aspect-ratio\
      \ > ha-card {\n\n    align-items: flex-start;\n\n    > ha-state-icon {\n      left:\
      \ auto;\n      right: 0;\n      border-right: 0px;\n      border-left: var(--lcars-background-color)\
      \ solid 6px;\n    }\n    \n    > span {\n      justify-content: flex-start;\n  \
      \    left: var(--lcars-vertical-border);\n      padding-inline: 6px;\n    }\n  \
      \  \n    /* Big Slider Card */\n    &:is(#container) {\n      > #slider {\n    \
      \    right: calc(var(--lcars-vertical-border) + 6px);\n        left: 0;\n      \
      \  background: linear-gradient(90deg, var(--bsc-slider-color), var(--bsc-slider-color)\
      \ var(--bsc-percent), transparent var(--bsc-percent), transparent 100%);\n     \
      \ }\n      > #content {\n        padding-left: var(--ha-card-border-radius);\n \
      \       padding-right: 0px;\n        justify-content: left;\n      }\n    }\n  }\n\
      }\n\n\n/* ----------------------------------------------- */\n/*               \
      \    Corner Radii                  */\n/* -----------------------------------------------\
      \ */\n:host(.button-lozenge-left),\n:host(.button-lozenge-right),\n:host(.button-bullet-left),\n\
      :host(.button-capped-right),\n:host(.button-bar-left),\n:host(.button-bar-right)\
      \ {\n  > ha-card#container,\n  > ha-card, \n  > #aspect-ratio > ha-card {\n    border-top-right-radius:\
      \ var(--ha-card-border-radius);\n    border-bottom-right-radius: var(--ha-card-border-radius);\n\
      \  }\n}\n:host(.button-lozenge-left),\n:host(.button-lozenge-right),\n:host(.button-bullet-right),\n\
      :host(.button-capped-left),\n:host(.button-bar-left),\n:host(.button-bar-right)\
      \ {\n  > ha-card#container,\n  > ha-card, \n  > #aspect-ratio > ha-card {\n\n  \
      \  border-top-left-radius: var(--ha-card-border-radius);\n    border-bottom-left-radius:\
      \ var(--ha-card-border-radius);\n  }\n}\n:host(.button-lozenge-left), \n:host(.button-bullet-left)\
      \ {\n  > ha-card#container,\n  > ha-card, \n  > #aspect-ratio > ha-card {\n    >\
      \ span {\n      padding-right: var(--ha-card-border-radius);\n    }\n  }\n}\n:host(.button-lozenge-right),\
      \ \n:host(.button-bullet-right) {\n  > ha-card#container,\n  > ha-card, \n  > #aspect-ratio\
      \ > ha-card {\n    > span {\n      padding-left: var(--ha-card-border-radius);\n\
      \    }\n  }\n}\n\n/* ----------------------------------------------- */\n/*    \
      \              Button Bar                     */\n/* -----------------------------------------------\
      \ */\n:host(.button-bar-left),\n:host(.button-bar-right) {\n  > ha-card#container,\n\
      \  > ha-card, \n  > #aspect-ratio > ha-card {\n\n    line-height: 60px;\n    font-size:\
      \ 60px;\n    padding-left: var(--lcars-vertical-border);\n    flex-direction: row;\n\
      \    justify-content: space-between;\n\n    > span {\n      width: fit-content;\n\
      \      padding: 0px;\n\n      &:is(.state) {\n        padding-right: var(--ha-card-border-radius);\n\
      \        height: 100%;\n      }\n\n      &:not(.state) { \n        color: var(--lcars-text-light);\n\
      \        height: 100%;\n        background-color: var(--lcars-background-color);\n\
      \        padding-inline: 6px;\n        padding-bottom: 0.05em;\n        margin-top:\
      \ -0.5em;\n      }\n    }\n    \n    > ha-state-icon {\n      font-size: 0;\n  \
      \  }\n    \n    /* Big Slider Card */\n    &:is(#container) {\n      > #slider {\n\
      \        right: 0;\n        left: calc(var(--lcars-vertical-border) + 6px);\n  \
      \      background: linear-gradient(90deg, var(--bsc-slider-color), var(--bsc-slider-color)\
      \ var(--bsc-percent), transparent var(--bsc-percent), transparent 100%);\n     \
      \ }\n      > #content {\n        position: relative;\n        padding-right: var(--ha-card-border-radius);\n\
      \        padding-left: 18px;\n        padding-bottom: 0.1em;\n        justify-content:\
      \ left;\n      }\n    }\n    \n  }\n}\n\n:host(.button-bar-right) {\n  > ha-card#container,\n\
      \  > ha-card, \n  > #aspect-ratio > ha-card {\n\n    flex-direction: row-reverse;\n\
      \    padding-left: 0;\n    padding-right: var(--lcars-vertical-border);\n\n    >\
      \ span:is(.state) {\n        padding-left: var(--ha-card-border-radius);\n     \
      \   padding-right: 0;\n    }\n\n    > ha-state-icon {\n      left: auto;\n     \
      \ right: 0;\n      border-right: 0px;\n      border-left: var(--lcars-background-color)\
      \ solid 6px;\n    }\n\n    /* Big Slider Card */\n    &:is(#container) {\n     \
      \ > #slider {\n        right: calc(var(--lcars-vertical-border) + 6px);\n      \
      \  left: 0;\n        background: linear-gradient(90deg, var(--bsc-slider-color),\
      \ var(--bsc-slider-color) var(--bsc-percent), transparent var(--bsc-percent), transparent\
      \ 100%);\n      }\n      > #content {\n        padding-left: var(--ha-card-border-radius);\n\
      \        padding-right: 18px;\n        justify-content: right;\n      }\n    }\n\
      \  }\n  \n}\n\n\n/* =============================================== */\n/*     \
      \               BAR STYLES                   */\n/* ===============================================\
      \ */\n\n/* ----------------------------------------------- */\n/*              \
      \  Common Bar Styles                */\n/* -----------------------------------------------\
      \ */\n:host(.bar-left),\n:host(.bar-right),\n:host(.bar-large-left),\n:host(.bar-large-right),\n\
      ha-card:is(.bar-left,\n           .bar-large-left,\n           .bar-right,\n   \
      \        .bar-large-right\n):not(div > *)   {\n  background-color: var(--lcars-card-top-color);\n\
      \  border-radius: 9999px;\n  display: block;\n  height: 1em;\n  font-size: 2em;\n\
      \  line-height: 1;\n  overflow:hidden;\n\n  > :not(style,card-mod) {\n    text-transform:\
      \ uppercase;\n    background-color: var(--lcars-background-color);\n    border-radius:\
      \ 0px;\n    display: inline-block;\n    padding: 0px 6px 0px 6px;\n    height: calc(100%\
      \ + 0.4em);\n    vertical-align: top;\n    overflow: hidden;\n\n    > ha-markdown\
      \ {\n      padding: 0px;\n      margin-top: -0.06em;\n    }\n  }\n\n  .title { \n\
      \    font-size: inherit !important;\n    line-height: 1;\n    margin-top: -0.06em;\n\
      \  }\n}\n\n:host(.bar-large-left),\n:host(.bar-large-right),\nha-card:is(.bar-large-left,\n\
      \           .bar-large-right\n):not(div > *) {\n    font-size: 3em;\n}\n\n:host(.bar-left),\n\
      :host(.bar-large-left),\nha-card:is(.bar-left,\n           .bar-large-left\n):not(div\
      \ > *) {\n  border-left: var(--lcars-vertical-border) solid var(--lcars-card-top-color);\n\
      }\n\n:host(.bar-right),\n:host(.bar-large-right),\nha-card:is(.bar-right,\n    \
      \       .bar-large-right\n):not(div > *) {\n  border-right: var(--lcars-vertical-border)\
      \ solid var(--lcars-card-top-color);\n  text-align: right;\n}\n\n/* ===============================================\
      \ */\n/*               MISCELLANEOUS STYLES              */\n/* ===============================================\
      \ */\n\n/* WIP fix for aliasing ugliness on slider tracks */\n.type-light > .bar\
      \ {\n  stroke-width: 5px;\n}\n\n/* -----------------------------------------------\
      \ */\n/*               Specific Card Fixes               */\n/* -----------------------------------------------\
      \ */\n\n/* ----------- Calendar Card --------------------- */\n:host(.type-calendar),\n\
      ha-card:is(.type-calendar) {\n  ha-full-calendar {\n    --card-background-color:\
      \ black;\n    --table-header-background-color: var(--lcars-dark-gray);\n  }\n}\n\
      \n/* ----------- HTML Template Card ---------------- */\n:host, ha-card {\n  &:is(.type-custom-html-template-card,\
      \ .type-custom-html-card) {\n    padding:0px !important;\n  }\n}\n\n/* -----------\
