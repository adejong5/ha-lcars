      \ solid var(--lcars-card-top-color);\n  text-align: right;\n}\n\n/* ===============================================\
      \ */\n/*               MISCELLANEOUS STYLES              */\n/* ===============================================\
      \ */\n\n/* WIP fix for aliasing ugliness on slider tracks */\n.type-light > .bar\
      \ {\n  stroke-width: 5px;\n}\n\n/* -----------------------------------------------\
      \ */\n/*               Specific Card Fixes               */\n/* -----------------------------------------------\
      \ */\n\n/* ----------- Calendar Card --------------------- */\n:host(.type-calendar),\n\
      ha-card:is(.type-calendar) {\n  ha-full-calendar {\n    --card-background-color:\
      \ black;\n    --table-header-background-color: var(--lcars-dark-gray);\n  }\n}\n\
      \n/* ----------- HTML Template Card ---------------- */\n:host, ha-card {\n  &:is(.type-custom-html-template-card,\
      \ .type-custom-html-card) {\n    padding:0px !important;\n  }\n}\n\n/* -----------\
      \ Weather Card ---------------------- */\n:host(.type-custom-weather-card) > ha-card\
      \ {\n  padding-top: 12px !important;\n}\n"
    ha-card ha-gauge$: ".gauge {\n  --primary-background-color: var(--lcars-dark-gray);\n\
      }\n"
