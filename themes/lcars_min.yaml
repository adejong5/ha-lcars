      \  > :not(style,card-mod) {\n    padding-right: 6px;\n  }\n}\n\n/* ===============================================\
      \ */\n/*        FOOTER CLASSES AND CARD TYPE FIXES       */\n/* ===============================================\
      \ */\n\n/* ------------- Common Footer Styles ------------ */\n:host(.footer-left),\n\
