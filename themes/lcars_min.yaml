      \ 100% !important;\n      border-right: var(--lcars-background-color) solid 6px;\n\
      \      display: flex;\n      align-items: center;\n      justify-content: center;\n\
      \    }\n    \n    > span {\n      width: 100%;\n      height: 100%;\n      display:\
      \ flex;\n      align-items: flex-end;\n      justify-content: flex-end;\n      margin-top:\
      \ unset;\n      padding: 6px;\n    }\n    \n    > span.state {\n      align-items:\
      \ center;\n      color: var(--lcars-text-dark);\n    }\n\n    /* Big Slider Card\
      \ */\n    &:is(#container) {\n      > #slider {\n        right: 0;\n        left:\
      \ calc(var(--lcars-vertical-border) + 6px);\n        background: linear-gradient(90deg,\
      \ var(--bsc-slider-color), var(--bsc-slider-color) var(--bsc-percent), transparent\
      \ var(--bsc-percent), transparent 100%);\n      }\n      > #content {\n        padding-left:\
      \ calc(var(--lcars-vertical-border) + 18px);\n        justify-content: right;\n\
