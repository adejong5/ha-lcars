      \        padding-inline: 6px;\n        padding-bottom: 0.05em;\n        margin-top:\
      \ -0.5em;\n      }\n    }\n    \n    > ha-state-icon {\n      font-size: 0;\n  \
      \  }\n    \n    /* Big Slider Card */\n    &:is(#container) {\n      > #slider {\n\
      \        right: 0;\n        left: calc(var(--lcars-vertical-border) + 6px);\n  \
      \      background: linear-gradient(90deg, var(--bsc-slider-color), var(--bsc-slider-color)\
