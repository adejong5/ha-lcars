      \ + 0.4em);\n    vertical-align: top;\n    overflow: hidden;\n\n    > ha-markdown\
      \ {\n      padding: 0px;\n      margin-top: -0.06em;\n    }\n  }\n\n  .title { \n\
      \    font-size: inherit !important;\n    line-height: 1;\n    margin-top: -0.06em;\n\
      \  }\n}\n\n:host(.bar-large-left),\n:host(.bar-large-right),\nha-card:is(.bar-large-left,\n\
      \           .bar-large-right\n):not(div > *) {\n    font-size: 3em;\n}\n\n:host(.bar-left),\n\
