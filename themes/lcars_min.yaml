      \ {{ states('input_number.lcars_menu_font') if has_value('input_number.lcars_menu_font')\
      \ else 24 }}px !important;\n  &:not(.type-undefined,.type-custom-grid-layout) {\n\
      \    height: 100%;\n  }\n  \n}\n:host > ha-card > .card-actions,\n:host > ha-card\
      \ > .card-actions .position-badge {\n  color: var(--lcars-text-dark);\n}\n\n/* -----------------------------------------------\
      \ */\n/*                Common Card Styles               */\n/* -----------------------------------------------\
      \ */\n:host > ha-card {\n  font-family: var(--font-family) !important;\n  --md-sys-color-primary:\
      \ var(--lcars-ui-quaternary) !important;\n}\n\n/* ===============================================\
      \ */\n/*        HEADER CLASSES AND CARD TYPE FIXES       */\n/* ===============================================\
      \ */\n\n/* ------------- Common Header Styles ------------ */\n:host(.header-left),\n\
